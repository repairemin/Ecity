<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hanoi High-Detail Simulation - Drone Navigator</title>
    <style>
        body { margin: 0; overflow: hidden; background: #a5e1ff; }
        #info {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.7); color: #00ffcc;
            padding: 10px; font-family: monospace; border-left: 4px solid #fff;
        }
    </style>
</head>
<body>
    <div id="info">LOCATION: HANOI_CITY | MODE: RANDOM_STREET_FLIGHT</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa5e1ff);
        scene.fog = new THREE.FogExp2(0xa5e1ff, 0.001);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(100, 500, 100);
        scene.add(sun);

        function createRoadTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#333333';
            ctx.fillRect(0, 0, 512, 512);
            ctx.strokeStyle = '#ffffff';
            ctx.setLineDash([20, 20]);
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(256, 0); ctx.lineTo(256, 512);
            ctx.moveTo(0, 256); ctx.lineTo(512, 256);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#ffffff';
            for(let i=0; i<6; i++) {
                ctx.fillRect(230 + i*8, 180, 4, 30);
                ctx.fillRect(180, 230 + i*8, 30, 4);
            }
            return new THREE.CanvasTexture(canvas);
        }

        const roadTex = createRoadTexture();
        roadTex.wrapS = roadTex.wrapT = THREE.RepeatWrapping;
        roadTex.repeat.set(10, 10);

        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(2000, 2000),
            new THREE.MeshLambertMaterial({ map: roadTex })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        const city = new THREE.Group();
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const obstacleMeshes = []; // Mảng để chứa các tòa nhà phục vụ check va chạm

        function addBuilding(x, z, type) {
            let h, w, d, color;
            if (type === 'old') {
                h = 10 + Math.random() * 15;
                w = 8 + Math.random() * 4;
                d = 15 + Math.random() * 10;
                color = 0xffdb58;
            } else {
                h = 80 + Math.random() * 120;
                w = 20 + Math.random() * 10;
                d = 20 + Math.random() * 10;
                color = 0x88ccff;
            }

            const mat = new THREE.MeshPhongMaterial({ color: color });
            const b = new THREE.Mesh(boxGeo, mat);
            b.scale.set(w, h, d);
            b.position.set(x, h/2, z);
            city.add(b);
            obstacleMeshes.push(b); // Thêm vào danh sách vật cản

            if (type === 'old') {
                const roof = new THREE.Mesh(new THREE.BoxGeometry(w+1, 2, d+1), new THREE.MeshLambertMaterial({color: 0xcc3300}));
                roof.position.set(x, h + 1, z);
                city.add(roof);
                obstacleMeshes.push(roof);
            }
        }

        const lake = new THREE.Mesh(
            new THREE.CircleGeometry(150, 32),
            new THREE.MeshPhongMaterial({ color: 0x224466, shininess: 100 })
        );
        lake.rotation.x = -Math.PI / 2;
        lake.position.y = 0.2;
        scene.add(lake);

        for (let i = 0; i < 800; i++) {
            const x = (Math.random() - 0.5) * 1400;
            const z = (Math.random() - 0.5) * 1400;
            const dist = Math.sqrt(x*x + z*z);
            if (dist < 160) continue;
            if (x > 250 || z > 250) { addBuilding(x, z, 'new'); } 
            else { addBuilding(x, z, 'old'); }
        }
        scene.add(city);

        // --- CAMERA LOGIC MỚI ---
        let time = 0;
        let mode = "START";
        let lapTime = 0; // Đếm thời gian ở dưới mặt đất
        let velocity = new THREE.Vector3(1, 0, 0); // Hướng bay ban đầu
        const raycaster = new THREE.Raycaster();
        const moveSpeed = 1.5;

        function animate() {
            requestAnimationFrame(animate);
            time += 0.003;

            if (mode === "START") {
                camera.position.set(Math.sin(time)*900, 600, Math.cos(time)*900);
                camera.lookAt(0, 0, 0);
                if (time > Math.PI) {
                    mode = "DESCEND";
                    lapTime = 0;
                }
            } 
            else if (mode === "DESCEND") {
                camera.position.lerp(new THREE.Vector3(180, 15, 180), 0.02);
                camera.lookAt(0, 5, 0);
                if (camera.position.y < 20) {
                    mode = "STREET_VIEW";
                    velocity.set(Math.random() - 0.5, 0, Math.random() - 0.5).normalize();
                }
            }
            else if (mode === "STREET_VIEW") {
                lapTime += 0.003;
                
                // 1. Dùng tia Raycaster để "nhìn" phía trước
                const rayOrigin = camera.position.clone();
                const rayDirection = velocity.clone().normalize();
                raycaster.set(rayOrigin, rayDirection);
                raycaster.far = 40; // Khoảng cách nhìn xa để né

                const intersections = raycaster.intersectObjects(obstacleMeshes);

                // 2. Nếu có vật cản phía trước hoặc quá xa trung tâm, rẽ hướng ngẫu nhiên
                const distFromCenter = camera.position.length();
                if (intersections.length > 0 || distFromCenter > 800) {
                    // Xoay một góc ngẫu nhiên 90 độ
                    const angle = (Math.random() > 0.5 ? 1 : -1) * Math.PI / 2;
                    velocity.applyAxisAngle(new THREE.Vector3(0, 1, 0), angle);
                }

                // 3. Cập nhật vị trí
                camera.position.addScaledVector(velocity, moveSpeed);
                camera.position.y = 12 + Math.sin(time * 5) * 1; // Nhấp nhô nhẹ cho giống drone

                // 4. Hướng nhìn luôn nhìn về phía trước vận tốc
                const lookAtPos = camera.position.clone().add(velocity);
                camera.lookAt(lookAtPos);

                // 5. Sau khi bay khoảng "nhiều vòng" (dựa trên lapTime), bay lên lại
                if (lapTime > 15) { // 15 là khoảng thời gian bay dưới phố
                    mode = "ASCEND";
                }
            }
            else if (mode === "ASCEND") {
                // Bay vút lên cao theo đường xoắn ốc
                camera.position.y += 3;
                camera.position.x += Math.sin(time * 5) * 2;
                camera.position.z += Math.cos(time * 5) * 2;
                camera.lookAt(0, 0, 0);

                if (camera.position.y > 600) {
                    mode = "START";
                    time = 0; // Reset để quay lại vòng lặp ban đầu
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
